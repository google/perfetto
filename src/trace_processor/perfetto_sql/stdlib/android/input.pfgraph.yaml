#!perfetto_querygraph_yaml
module: android.input
imports: [android.frames.timeline, intervals.intersect, slices.with_context]

# Input messages sent (sendMessage slices with thread/process context).
_input_message_sent:
  ops:
    - table:
        sql: |
          SELECT
            str_split(str_split(slice.name, '=', 3), ')', 0) AS event_type,
            str_split(str_split(slice.name, '=', 2), ',', 0) AS event_seq,
            str_split(str_split(slice.name, '=', 1), ',', 0) AS event_channel,
            thread.tid, thread.name AS thread_name,
            process.upid, process.pid, process.name AS process_name,
            slice.ts, slice.dur, slice.track_id
          FROM slice
          JOIN thread_track ON thread_track.id = slice.track_id
          JOIN thread USING (utid)
          JOIN process USING (upid)
          WHERE slice.name GLOB 'sendMessage(*'
          ORDER BY event_seq

# Input messages received (receiveMessage slices with thread/process context).
_input_message_received:
  ops:
    - table:
        sql: |
          SELECT
            str_split(str_split(slice.name, '=', 3), ')', 0) AS event_type,
            str_split(str_split(slice.name, '=', 2), ',', 0) AS event_seq,
            str_split(str_split(slice.name, '=', 1), ',', 0) AS event_channel,
            thread.tid, thread.name AS thread_name,
            process.upid, process.pid, process.name AS process_name,
            slice.ts, slice.dur, slice.track_id
          FROM slice
          JOIN thread_track ON thread_track.id = slice.track_id
          JOIN thread USING (utid)
          JOIN process USING (upid)
          WHERE slice.name GLOB 'receiveMessage(*'
          ORDER BY event_seq

# Input read time from UnwantedInteractionBlocker slices.
_input_read_time:
  ops:
    - table:
        sql: |
          WITH _extracted_input_read_args AS (
            SELECT name,
              str_split(str_split(str_split(name, 'id=', 1), ',', 0), ')', 0) AS input_event_id,
              str_split(str_split(name, 'eventTime=', 1), ')', 0) AS event_time_str,
              ts AS read_time
            FROM slice
            WHERE name GLOB 'UnwantedInteractionBlocker::notifyMotion*'
          )
          SELECT name, input_event_id, cast_int!(event_time_str) AS event_time, read_time
          FROM _extracted_input_read_args

# Map event_seq to input_event_id via sendMessage parent chain.
_event_seq_to_input_event_id:
  ops:
    - table:
        sql: |
          WITH _send_message_events AS (
            SELECT send_message_slice.name,
              enqueue_slice.name AS enqueue_name,
              thread_slice.utid, thread_slice.thread_name,
              str_split(str_split(send_message_slice.name, '=', 1), ',', 0) AS event_channel
            FROM slice AS send_message_slice
            JOIN slice AS publish_slice ON send_message_slice.parent_id = publish_slice.id
            JOIN slice AS start_dispatch_slice ON publish_slice.parent_id = start_dispatch_slice.id
            JOIN slice AS enqueue_slice ON start_dispatch_slice.parent_id = enqueue_slice.id
            JOIN thread_slice ON send_message_slice.id = thread_slice.id
            WHERE send_message_slice.name GLOB 'sendMessage(*'
              AND thread_slice.thread_name = 'InputDispatcher'
          )
          SELECT
            str_split(str_split(name, '=', 2), ',', 0) AS event_seq,
            event_channel,
            str_split(str_split(event_channel, ' ', 1), '/', 0) AS process_name,
            str_split(str_split(enqueue_name, '=', 2), ')', 0) AS input_event_id,
            utid, thread_name
          FROM _send_message_events

# Clean android frames with do_frame slice info.
_clean_android_frames:
  ops:
    - table:
        sql: |
          SELECT f.ts, f.dur,
            do_frame_slice.id AS do_frame_id,
            do_frame_slice.ts AS do_frame_ts,
            do_frame_slice.dur AS do_frame_dur,
            cast_int!(ui_thread_utid) AS utid, frame_id
          FROM android_frames AS f
          JOIN slice AS do_frame_slice ON f.do_frame_id = do_frame_slice.id

# Clean deliver events with extracted input event id and action.
_clean_deliver_events:
  ops:
    - table:
        sql: |
          SELECT s.id, s.ts, s.dur,
            cast_int!(t.utid) AS utid, t.process_name,
            str_split(s.name, '=', 3) AS extracted_input_event_id,
            str_split(str_split(parent.name, '_', 1), ' ', 0) AS event_action,
            parent.ts AS consume_time,
            parent.ts + parent.dur AS finish_time
          FROM slice AS s
          JOIN thread_slice AS t USING (id)
          JOIN slice AS parent ON s.parent_id = parent.id
          WHERE s.name GLOB 'deliverInputEvent src=*'

# Exact match: find Choreographer#doFrame that intersects with deliver event.
_input_event_frame_intersections:
  ops:
    - table:
        sql: |
          SELECT
            ii.id_0 AS do_frame_id_key,
            ii.id_1 AS event_id_key,
            0 AS is_speculative_match
          FROM _interval_intersect!(
            (
              (
                SELECT do_frame_id AS id, do_frame_ts AS ts, do_frame_dur AS dur, *
                FROM _clean_android_frames WHERE do_frame_dur > 0
              ),
              (SELECT * FROM _clean_deliver_events WHERE dur > 0)
            ),
            (utid)
          ) AS ii

# Events that did not match a frame via interval intersection.
_input_events_pending_frame_match:
  ops:
    - table:
        sql: |
          SELECT * FROM _clean_deliver_events
          WHERE NOT id IN (SELECT event_id_key FROM _input_event_frame_intersections)

# Speculative match: find the immediate next frame for non-vsync-aligned events.
_input_event_frame_speculative_matches:
  ops:
    - table:
        sql: |
          WITH _ordered_future_frames AS (
            SELECT e.id AS event_id_key, f.do_frame_id AS do_frame_id_key,
              row_number() OVER (PARTITION BY e.id ORDER BY f.do_frame_ts ASC) AS rn
            FROM _input_events_pending_frame_match AS e
            JOIN _clean_android_frames AS f ON e.utid = f.utid AND f.do_frame_ts >= e.ts
          )
          SELECT do_frame_id_key, event_id_key, 1 AS is_speculative_match
          FROM _ordered_future_frames WHERE rn = 1

# Union of exact and speculative frame associations.
_input_event_frame_association:
  ops:
    - table:
        sql: |
          SELECT * FROM _input_event_frame_intersections
          UNION ALL
          SELECT * FROM _input_event_frame_speculative_matches

# Map input_event_id to android frame via association + deliver events.
_input_event_id_to_android_frame:
  ops:
    - table:
        sql: |
          SELECT
            dev.extracted_input_event_id AS input_event_id,
            dev.event_action, dev.consume_time, dev.finish_time,
            dev.utid, dev.process_name, af.frame_id, af.ts AS frame_ts,
            map.event_channel,
            CAST(assoc.is_speculative_match AS BOOL) AS is_speculative_match
          FROM _input_event_frame_association AS assoc
          JOIN _clean_android_frames AS af ON assoc.do_frame_id_key = af.do_frame_id
          JOIN _clean_deliver_events AS dev ON assoc.event_id_key = dev.id
          JOIN _event_seq_to_input_event_id AS map
            ON dev.extracted_input_event_id = map.input_event_id
            AND map.process_name = dev.process_name

# Map app frames to surface flinger frames.
_app_frame_to_surface_flinger_frame:
  ops:
    - table:
        sql: |
          SELECT
            app.surface_frame_token AS app_surface_frame_token,
            surface_flinger.ts AS surface_flinger_ts,
            surface_flinger.dur AS surface_flinger_dur,
            app.ts AS app_ts, app.present_type, app.upid
          FROM actual_frame_timeline_slice AS surface_flinger
          JOIN actual_frame_timeline_slice AS app
            ON surface_flinger.display_frame_token = app.display_frame_token
            AND surface_flinger.id != app.id
          WHERE surface_flinger.surface_frame_token IS NULL
            AND app.present_type != 'Dropped Frame'

# First non-dropped frame after input event.
_first_non_dropped_frame_after_input:
  ops:
    - table:
        sql: |
          SELECT
            _input_read_time.input_event_id,
            _input_read_time.read_time,
            _input_read_time.event_time,
            (
              SELECT surface_flinger_ts + surface_flinger_dur
              FROM _app_frame_to_surface_flinger_frame AS sf_frames
              WHERE sf_frames.app_ts >= _input_event_id_to_android_frame.frame_ts
              LIMIT 1
            ) AS present_time,
            (
              SELECT app_surface_frame_token
              FROM _app_frame_to_surface_flinger_frame AS sf_frames
              WHERE sf_frames.app_ts >= _input_event_id_to_android_frame.frame_ts
              LIMIT 1
            ) AS frame_id,
            event_seq, event_action,
            _input_event_id_to_android_frame.is_speculative_match
          FROM _input_event_id_to_android_frame
          RIGHT JOIN _event_seq_to_input_event_id
            ON _input_event_id_to_android_frame.input_event_id = _event_seq_to_input_event_id.input_event_id
            AND _input_event_id_to_android_frame.event_channel = _event_seq_to_input_event_id.event_channel
          JOIN _input_read_time
            ON _input_read_time.input_event_id = _event_seq_to_input_event_id.input_event_id

# Normalize event channel name.
_normalize_event_channel:
  type: function
  args: {event_channel: STRING}
  returns: STRING
  body: |
    SELECT CASE
      WHEN $event_channel GLOB '[[]*] *' THEN $event_channel
      WHEN $event_channel GLOB '* *:*'
      THEN trim(substr(str_split($event_channel, ':', 0), instr($event_channel, ' ') + 1))
      WHEN $event_channel GLOB '* *'
      THEN trim(substr($event_channel, instr($event_channel, ' ') + 1))
      WHEN $event_channel GLOB '*[0-9]'
      THEN regexp_extract($event_channel, '^(.*[a-zA-Z])')
      ELSE $event_channel
    END

# All input events with round trip latency breakdown.
android_input_events:
  type: table
  ops:
    - table:
        sql: |
          WITH
            dispatch AS (
              SELECT * FROM _input_message_sent
              WHERE thread_name = 'InputDispatcher'
              ORDER BY event_seq, event_channel
            ),
            receive AS (
              SELECT *, replace(event_channel, '(client)', '(server)') AS dispatch_event_channel
              FROM _input_message_received
              WHERE NOT event_type IN ('0x2', 'FINISHED')
              ORDER BY event_seq, dispatch_event_channel
            ),
            finish AS (
              SELECT *, replace(event_channel, '(client)', '(server)') AS dispatch_event_channel
              FROM _input_message_sent
              WHERE thread_name != 'InputDispatcher'
              ORDER BY event_seq, dispatch_event_channel
            ),
            finish_ack AS (
              SELECT * FROM _input_message_received
              WHERE event_type IN ('0x2', 'FINISHED')
              ORDER BY event_seq, event_channel
            )
          SELECT
            receive.ts - dispatch.ts AS dispatch_latency_dur,
            finish.ts - receive.ts AS handling_latency_dur,
            finish_ack.ts - finish.ts AS ack_latency_dur,
            finish_ack.ts - dispatch.ts AS total_latency_dur,
            frame.present_time - frame.read_time AS end_to_end_latency_dur,
            finish.tid AS tid,
            finish.thread_name AS thread_name,
            finish.upid AS upid,
            finish.pid AS pid,
            finish.process_name AS process_name,
            dispatch.event_type,
            frame.event_action,
            dispatch.event_seq,
            dispatch.event_channel,
            _normalize_event_channel(dispatch.event_channel) AS normalized_event_channel,
            frame.input_event_id,
            frame.read_time,
            dispatch.track_id AS dispatch_track_id,
            dispatch.ts AS dispatch_ts,
            dispatch.dur AS dispatch_dur,
            receive.ts AS receive_ts,
            receive.dur AS receive_dur,
            receive.track_id AS receive_track_id,
            frame.frame_id,
            frame.is_speculative_match AS is_speculative_frame,
            frame.event_time
          FROM dispatch
          JOIN receive
            ON receive.dispatch_event_channel = dispatch.event_channel
            AND dispatch.event_seq = receive.event_seq
          JOIN finish
            ON finish.dispatch_event_channel = dispatch.event_channel
            AND dispatch.event_seq = finish.event_seq
          JOIN finish_ack
            ON finish_ack.event_channel = dispatch.event_channel
            AND dispatch.event_seq = finish_ack.event_seq
          LEFT JOIN _first_non_dropped_frame_after_input AS frame
            ON frame.event_seq = dispatch.event_seq

# Key events processed by the Android framework.
android_key_events:
  type: view
  ops:
    - table:
        sql: |
          SELECT id, event_id, ts, arg_set_id, source, action, device_id, display_id, key_code
          FROM __intrinsic_android_key_events

# Motion events processed by the Android framework.
android_motion_events:
  type: view
  ops:
    - table:
        sql: |
          SELECT id, event_id, ts, arg_set_id, source, action, device_id, display_id
          FROM __intrinsic_android_motion_events

# Input event dispatching information.
android_input_event_dispatch:
  type: view
  ops:
    - table:
        sql: |
          SELECT id, event_id, arg_set_id, vsync_id, window_id
          FROM __intrinsic_android_input_event_dispatch

# InputConsumer processing slices lookup.
_input_consumers_lookup:
  type: table
  ops:
    - table:
        sql: |
          SELECT id, track_id, ts, dur,
            printf('0x%x', extract_arg(arg_set_id, 'cookie')) AS cookie
          FROM slice WHERE name GLOB 'InputConsumer processing on*'
    - index: cookie

# Choreographer#doFrame slices lookup.
_frame_choreographer_lookup:
  type: table
  ops:
    - table:
        sql: |
          SELECT id, track_id, ts, dur,
            cast_int!(str_split(name, ' ', 1)) AS frame_id
          FROM slice WHERE name GLOB 'Choreographer#doFrame*'
    - index: frame_id

# Full lifecycle of an Android input event by slice ID.
_android_input_lifecycle_by_slice_id:
  type: function
  args: {slice_id: LONG}
  returns: "TABLE(input_id: STRING, channel: STRING, total_latency: LONG, ts_reader: LONG, ts_dispatch: LONG, ts_receive: LONG, ts_consume: LONG, ts_frame: LONG, id_reader: LONG, track_reader: LONG, dur_reader: LONG, id_dispatch: LONG, track_dispatch: LONG, dur_dispatch: LONG, id_receive: LONG, track_receive: LONG, dur_receive: LONG, id_consume: LONG, track_consume: LONG, dur_consume: LONG, id_frame: LONG, track_frame: LONG, dur_frame: LONG, is_speculative_frame: BOOL)"
  body: |
    SELECT
      e.input_event_id AS input_id,
      e.event_channel AS channel,
      e.end_to_end_latency_dur AS total_latency,
      e.read_time AS ts_reader,
      e.dispatch_ts AS ts_dispatch,
      e.receive_ts AS ts_receive,
      s_cons.ts AS ts_consume,
      s_frame.ts AS ts_frame,
      s_read.id AS id_reader,
      s_read.track_id AS track_reader,
      s_read.dur AS dur_reader,
      s_disp.id AS id_dispatch,
      e.dispatch_track_id AS track_dispatch,
      s_disp.dur AS dur_dispatch,
      s_recv.id AS id_receive,
      e.receive_track_id AS track_receive,
      s_recv.dur AS dur_receive,
      s_cons.id AS id_consume,
      s_cons.track_id AS track_consume,
      s_cons.dur AS dur_consume,
      s_frame.id AS id_frame,
      s_frame.track_id AS track_frame,
      s_frame.dur AS dur_frame,
      e.is_speculative_frame
    FROM android_input_events AS e
    LEFT JOIN slice AS s_read
      ON s_read.ts = e.read_time AND s_read.track_id != 0
    LEFT JOIN slice AS s_disp
      ON s_disp.ts = e.dispatch_ts AND s_disp.track_id = e.dispatch_track_id
    LEFT JOIN slice AS s_recv
      ON s_recv.ts = e.receive_ts AND s_recv.track_id = e.receive_track_id
    LEFT JOIN _input_consumers_lookup AS s_cons
      ON s_cons.cookie = e.event_seq
    LEFT JOIN _frame_choreographer_lookup AS s_frame
      ON s_frame.frame_id = CAST(e.frame_id AS LONG)
    WHERE $slice_id IN (s_read.id, s_disp.id, s_recv.id, s_cons.id, s_frame.id)
