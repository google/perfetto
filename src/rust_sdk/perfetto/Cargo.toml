[package]
name = "perfetto"
version = "0.1.0"
edition = "2024"

[features]
default = []
intrinsics = []
vendored = ["perfetto-sys/vendored"]

[dependencies]
perfetto-sys = { path = "../perfetto-sys", default-features = false }
bitflags = "2"
paste = "1"
thiserror = "1"

[[example]]
name = "track_event"
path = "examples/track_event.rs"

[[example]]
name = "data_source"
path = "examples/data_source.rs"
