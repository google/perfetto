// frameworks/native winscope extensions. Source of truth lives at
// frameworks/native/tracing/winscope/ in the Android tree.
//
// NOTE on import style differences: The mirror files under external/perfetto/
// use import public and full external-path formats (e.g. import public
// "protos/third_party/..."), whereas the canonical Android files under
// frameworks/ use plain imports and tree-rooted paths. Both setups are required
// by their respective code generator environments; neither side should be
// "fixed" to match the other.

syntax = "proto2";

import public "protos/perfetto/trace/trace_packet.proto";
import "protos/third_party/android/frameworks/native/tracing/winscope/surfaceflinger_layers.proto";
import "protos/third_party/android/frameworks/native/tracing/winscope/surfaceflinger_transactions.proto";
import "protos/third_party/android/frameworks/native/tracing/winscope/android_input_event.proto";
import "protos/third_party/android/frameworks/native/tracing/winscope/protolog.proto";

package com.android.internal;
option java_package = "com.android.internal.tracing.winscope.protos";

// The umbrella "socket" message. frameworks/base imports this file to extend
// it.
message WinscopeExtensions {
  // FROZEN: this extension range is permanently capped at 1-8. These eight
  // payloads are grandfathered from the pre-migration WinscopeExtensions
  // umbrella (TracePacket field 112) and keep their exact wire format because
  // existing traces are archival. Do NOT add new extension numbers here. New
  // winscope-adjacent payloads must instead request their own TracePacket
  // extension hole from the perfetto team and define their own wrapper message
  // (see the consumer README). Tracking bug: b/512378033
  //
  // NOTE for external/perfetto copy only: this file is a read-only mirror owned
  // by the Android tree; changes land there first.
  extensions 1 to 8;
}

message FrameworksNativeWinscopeTracePacket {
  extend perfetto.protos.TracePacket {
    optional LayersSnapshotProto surfaceflinger_layers_snapshot = 93;
    optional TransactionTraceEntry surfaceflinger_transactions = 94;
    optional ProtoLogMessage protolog_message = 104;
    optional ProtoLogViewerConfig protolog_viewer_config = 105;

    // Groups winscope payloads under one TracePacket field instead of one each;
    // the messages are added to WinscopeExtensions by the
    // *WinscopeExtensions wrapper messages.
    optional WinscopeExtensions winscope_extensions = 112;
  }
}

message FrameworksNativeWinscopeExtensions {
  extend WinscopeExtensions {
    optional AndroidInputEvent android_input_event = 5;
    optional LayersPatchProto surfaceflinger_layers_patch = 7;
  }
}
