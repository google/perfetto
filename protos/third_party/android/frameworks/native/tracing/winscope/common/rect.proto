syntax = "proto2";

// WARNING: All winscope proto import statements must use long tree-rooted paths
// (e.g. import "frameworks/native/tracing/winscope/common/rect.proto"). Never use short-form
// imports (e.g. winscope/common/rect.proto) as they cause duplicate-definition compile failures.
package com.android.internal;
option java_package = "com.android.internal.tracing.winscope.protos";

message RectProto {
  optional int32 left = 1;
  optional int32 top = 2;
  optional int32 right = 3;
  optional int32 bottom = 4;
}
