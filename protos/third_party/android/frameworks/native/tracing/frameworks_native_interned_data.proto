syntax = "proto2";

import public "protos/perfetto/trace/interned_data/interned_data.proto";
import "protos/perfetto/trace/profiling/profile_common.proto";

package com.android.internal;

message FrameworksNativeInternedData {
  extend perfetto.protos.InternedData {
    repeated perfetto.protos.InternedString protolog_string_args = 36;
    repeated perfetto.protos.InternedString protolog_stacktrace = 37;
  }
}
