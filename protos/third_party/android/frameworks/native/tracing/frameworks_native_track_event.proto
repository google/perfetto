// frameworks/native TrackEvent extensions. Source of truth lives at
// frameworks/native/tracing/ in the Android tree. See
// https://github.com/google/perfetto/discussions/4783
//
// Schema declarations (messages + extensions on perfetto.protos.TrackEvent
// in [2000, 2003], [2007] and [2100, 2199]) are intentionally NOT in this
// file yet. They still live in protos/perfetto/trace/android/
// android_track_event.proto and will move here when the follow-up PR
// converts that file to an import-only shim and re-splits the
// android_system registry allocation.

syntax = "proto2";

import public "protos/perfetto/trace/track_event/track_event.proto";

package perfetto.protos;
