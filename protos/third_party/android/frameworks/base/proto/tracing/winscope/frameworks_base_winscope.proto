// frameworks/base winscope extensions. Source of truth lives at
// frameworks/base/proto/tracing/winscope/ in the Android tree.

syntax = "proto2";

import public "protos/perfetto/trace/trace_packet.proto";
// Imported for the WinscopeExtensions umbrella socket defined by native.
import public "protos/third_party/android/frameworks/native/tracing/winscope/frameworks_native_winscope.proto";
import "protos/third_party/android/frameworks/base/proto/tracing/winscope/shell_transition.proto";
import "protos/third_party/android/frameworks/base/proto/tracing/winscope/inputmethodeditor.proto";
import "protos/third_party/android/frameworks/base/proto/tracing/winscope/viewcapture.proto";
import "protos/third_party/android/frameworks/base/proto/tracing/winscope/windowmanager.proto";
import "protos/third_party/android/frameworks/base/proto/tracing/winscope/server/windowmanagerservice.proto";

package com.android.internal;
option java_package = "com.android.internal.tracing.winscope.protos";

message FrameworksBaseWinscopeTracePacket {
  extend perfetto.protos.TracePacket {
    optional ShellTransition shell_transition = 96;
    optional ShellHandlerMappings shell_handler_mappings = 97;
  }
}

message FrameworksBaseWinscopeExtensions {
  extend WinscopeExtensions {
    optional InputMethodClientsTraceProto inputmethod_clients = 1;
    optional InputMethodServiceTraceProto inputmethod_service = 2;
    optional InputMethodManagerServiceTraceProto inputmethod_manager_service =
        3;
    optional ViewCapture viewcapture = 4;
    optional WindowManagerTraceEntry windowmanager = 6;
    optional WindowManagerServicePatchProto windowmanager_patch = 8;
  }
}
