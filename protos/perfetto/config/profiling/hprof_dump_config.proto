syntax = "proto2";

package perfetto.protos;

// Configuration for the android.hprof_dump data source.
// Triggers a heap dump on a target process and embeds the raw .hprof
// binary in the trace. Optionally extracts bitmap images.
message HprofDumpConfig {
  // Target process PID. Takes precedence over process_cmdline.
  optional uint64 pid = 1;

  // Target process command line pattern. Matched against /proc/pid/cmdline.
  optional string process_cmdline = 2;

  // Run GC before dumping. Default true.
  optional bool run_gc = 3;

  // Extract bitmap images alongside the hprof dump.
  // Calls Bitmap.dumpAll() in the target process.
  // Equivalent to `am dumpheap -b <format>`.
  optional bool dump_bitmaps = 4;

  // Bitmap output format: "png" (default) or "webp".
  // Only used when dump_bitmaps is true.
  optional string bitmap_format = 5;
}
