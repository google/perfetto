syntax = "proto2";

package perfetto.protos;

// Configuration for the "android.display.video" data source, which captures
// what each display showed during the trace and emits it as top-level
// TracePacket VideoFrames.
message DisplayVideoConfig {
  // Hardware video codec used to encode the captured frames.
  enum Format {
    // Data source default (H.264).
    FORMAT_UNSPECIFIED = 0;
    FORMAT_H264 = 1;
    FORMAT_HEVC = 2;
  }

  // Scale factor applied to each display's resolution before capture
  // (e.g. 0.25 = quarter size). 0 = use the producer's default.
  optional float scale = 1;

  // Hardware-video codec to use. Unspecified = the data source default
  // (H.264).
  optional Format format = 2;

  // Encoder GOP size in seconds (keyframe every N seconds). Smaller =
  // snappier UI scrubbing, larger trace. Larger = smaller trace, slower
  // seek between keyframes. 0 = use the producer's default.
  optional uint32 key_frame_interval_secs = 3;

  // Per-stream cap (one stream = one captured display) on the total payload
  // bytes (codec_config + au_data) the producer will emit. Once reached,
  // further access units are dropped on that stream and the truncation is
  // reported via a VideoFrameStats packet. On multi-display devices total
  // bytes can be N * max_stream_size_bytes (the cap is per stream, mirroring
  // HeapprofdConfig.max_heapprofd_memory_kb which is per process). 0 = use
  // the producer's default.
  optional uint64 max_stream_size_bytes = 4;
}
