syntax = "proto2";

package perfetto.protos;

// Custom configuration for the "android.activity_manager.dumpsys" data source.
//
// The data source captures a one-shot snapshot of `dumpsys activity --proto`
// output at the start of tracing. The snapshot is emitted as a single
// TracePacket containing an ActivityManagerDumpsys message with the raw
// com.android.server.am.ActivityManagerServiceProto bytes.
message ActivityManagerDumpsysConfig {
  // Which dumpsys section to capture. Matches the subcommands of
  // `dumpsys activity --proto <section>`.
  enum DumpSection {
    // Full dump (equivalent to `dumpsys activity --proto`).
    DUMP_SECTION_ALL = 0;
    // `dumpsys activity --proto activities`.
    DUMP_SECTION_ACTIVITIES = 1;
    // `dumpsys activity --proto broadcasts`.
    DUMP_SECTION_BROADCASTS = 2;
    // `dumpsys activity --proto services`.
    DUMP_SECTION_SERVICES = 3;
    // `dumpsys activity --proto processes`.
    DUMP_SECTION_PROCESSES = 4;
  }

  optional DumpSection dump_section = 1;
}
