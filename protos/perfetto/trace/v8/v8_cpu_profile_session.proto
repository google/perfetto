syntax = "proto2";

package perfetto.protos;

// Per-V8-CPU-profile-session metadata. Emitted twice per session: a
// PHASE_START packet at StartProfiling time and a PHASE_END packet at
// StopProfiling time.
//
// The bulk of the profile data (ticks, callstacks, frames) flows through
// generic StreamingProfilePacket / Frame / Callstack messages plus the
// V8 extensions in v8_profile_extensions.proto. This packet only carries
// the few session-scoped fields that don't fit naturally into the generic
// streaming format: the session id used for correlating samples to a
// single profiler invocation.
message V8CpuProfileSession {
  enum Phase {
    PHASE_UNKNOWN = 0;
    PHASE_START = 1;
    PHASE_END = 2;
  }

  optional Phase phase = 1;

  // V8-internal session id. Stable across the START/END pair.
  optional uint64 session_id = 2;

  // Free-form origin string.
  optional string source = 3;

  // Wall-clock time in microseconds since CLOCK_MONOTONIC origin.
  optional int64 wall_time_us = 4;

  // Thread time in microseconds at the moment of START / END.
  optional int64 thread_time_us = 5;
}
