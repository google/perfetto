syntax = "proto2";

package perfetto.protos;

// Per-V8-CPU-profile-session metadata. Emitted twice per session: a
// PHASE_START packet at StartProfiling time and a PHASE_END packet at
// StopProfiling time.
//
// The bulk of the profile data flows through generic StackSample, Frame, and
// Callstack messages plus the V8 extensions in v8_profile_extensions.proto.
// This packet carries session scoped metadata that does not fit naturally in
// those messages.
message V8CpuProfileSession {
  enum Phase {
    PHASE_UNKNOWN = 0;
    PHASE_START = 1;
    PHASE_END = 2;
  }

  optional Phase phase = 1;

  // Free-form origin string.
  optional string source = 2;

  // Wall-clock time in microseconds since CLOCK_MONOTONIC origin.
  optional int64 wall_time_us = 3;

  // Thread time in microseconds at the moment of START / END.
  optional int64 thread_time_us = 4;

  // OS process and thread that own this logical profile. These let exporters
  // represent an empty profile, which has no StackSample task context.
  optional int32 pid = 5;
  optional int32 tid = 6;
}
