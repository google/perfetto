syntax = "proto2";

package perfetto.protos;

// A snapshot of `dumpsys activity --proto`, captured by the
// "android.activity_manager.dumpsys" data source in system_server.
message ActivityManagerDumpsys {
  // Serialized com.android.server.am.ActivityManagerServiceProto
  // (or a subset depending on ActivityManagerDumpsysConfig.dump_section).
  // The schema is defined in
  // frameworks/base/core/proto/android/server/activitymanagerservice.proto.
  optional bytes activity_manager_proto = 1;
}
