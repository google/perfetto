syntax = "proto2";

package perfetto.protos;

// Raw Java heap dump (.hprof binary format) embedded in a trace packet.
// Large dumps can be split across multiple packets keyed by pid.
// The trace processor reassembles chunks per pid and parses each complete
// dump using the same parser as standalone .hprof file loading
// (ArtHprofParser).
message HprofDump {
  // Process ID of the dumped process. Used to group chunks belonging to
  // the same dump.
  optional int32 pid = 1;

  // Chunk of raw .hprof binary data.
  optional bytes hprof_data = 2;

  // Zero-based index of this chunk within the dump for this pid.
  optional uint32 chunk_index = 3;

  // True if this is the last chunk for this pid's dump.
  optional bool last_chunk = 4;
}
