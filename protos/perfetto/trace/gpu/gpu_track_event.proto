syntax = "proto2";

package perfetto.protos;

import "protos/perfetto/trace/track_event/track_event.proto";

// Correlates a track event with GPU render stage events.
message GpuCorrelation {
  // Event IDs of GpuRenderStageEvents that this track event submitted.
  repeated uint64 render_stage_submission_event_ids = 1;

  // Event IDs of GpuRenderStageEvents that this track event waited on
  // to complete.
  repeated uint64 render_stage_wait_event_ids = 2;
}

message GpuTrackEvent {
  extend TrackEvent {
    // Correlates this track event with GPU render stage events.
    optional GpuCorrelation gpu_correlation = 3000;
  }
}
