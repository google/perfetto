# Deploys the Perfetto UI to GitHub Pages when changes are pushed to the
# default branch (rdk/main) or when manually triggered from the Actions tab.
name: Deploy Perfetto UI to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["rdk/main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build the UI and store it as an artifact for deployment
  build-ui:
    uses: ./.github/workflows/build-ui.yml

  # Single deploy job since we're just deploying
  deploy-ui:
    runs-on: ubuntu-latest
    needs: build-ui

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      # Setup Pages action to prepare for deployment
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Download the built UI artifact from the build-ui job
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

