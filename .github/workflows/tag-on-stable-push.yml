# Creates and pushes the vX.Y git tag when `stable` advances, and
# creates the matching draft GitHub release.
#
# Triggered by pushes to `stable` (typically the merge of a PR
# opened by promote-stable.yml). Reads the target version from the
# top of CHANGELOG, verifies the tag doesn't already exist, then
# creates and pushes it at the new stable HEAD. The draft release
# body is pre-populated with the matching CHANGELOG section; a
# maintainer hand-edits it into full prose release notes before
# publishing.
#
# Authenticates with an installation token minted from the
# `perfetto-automation` GitHub App so the tag push fans out to
# other workflow runs (GITHUB_TOKEN pushes do not). LUCI and UI
# Cloud Build observe the tag push externally and fire regardless
# of who pushed it.
#
# Idempotent: no-ops when the latest version from CHANGELOG already
# has a tag (e.g. 'Unreleased:' still at the top, so the version
# resolves to the previous already-tagged release).

name: Tag stable release (on push to stable)

on:
  push:
    branches:
      - stable

permissions: {}

jobs:
  tag:
    runs-on: ubuntu-latest
    environment: perfetto-automation
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PERFETTO_BOT_APP_ID }}
          private-key: ${{ secrets.PERFETTO_BOT_PRIVATE_KEY }}

      - name: Checkout stable
        uses: actions/checkout@v4
        with:
          ref: stable
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Extract version from CHANGELOG
        id: version
        run: |
          VERSION=$(tools/write_version_header.py --stdout --no_git)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Target tag: $VERSION"

      - name: Skip if tag already exists
        id: exists
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::notice::Tag $VERSION already exists; nothing to do."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.exists.outputs.skip != '1'
        run: |
          # Email must match the CLA-approved address for the automation app.
          git config user.name "perfetto-automation[bot]"
          git config user.email "perfetto-automation-github-app@google.com"

      - name: Create and push tag
        if: steps.exists.outputs.skip != '1'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag -a "$VERSION" HEAD -m "Perfetto $VERSION"
          git push origin "refs/tags/$VERSION"
          echo "::notice::Tagged $VERSION at $(git rev-parse HEAD). LUCI and Cloud Build have been triggered."

      - name: Extract CHANGELOG section for draft release
        if: steps.exists.outputs.skip != '1'
        run: |
          python3 tools/release/extract_changelog_section.py \
            "${{ steps.version.outputs.version }}" > /tmp/release_body.txt
          echo "--- Draft release body ---"
          cat /tmp/release_body.txt

      - name: Create draft release (if missing)
        if: steps.exists.outputs.skip != '1'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ steps.version.outputs.version }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — leaving body untouched."
          else
            gh release create "$TAG" \
              --draft \
              --title "Perfetto $TAG" \
              --notes-file /tmp/release_body.txt
          fi
